<!doctype html>
<html>
  <head>
    <title>Hornse Survival</title>
    <style>
      body {
        background-color: rgb(50, 200, 30);
        margin: 0px;
        padding: 0px;
      }
      #canvas {
        display: block;
        position: absolute;
        top: 0px;
        left: 0px;
        z-index: -1;
        image-rendering: pixelated;
        background-color: rgb(50, 200, 30);
      }
    </style>
  </head>
  <body>
    <h1 id="test">// // //</h1>
    <canvas id="canvas"></canvas>
    <img hidden id="player" src="images/bestHornse.png" />
    <img hidden id="miniMap" src="images/miniMap.png" />
  </body>
</html>

<script>
  //CANVAS STUFF
  const playerImage = document.getElementById("player");
  const miniMapImage = document.getElementById("miniMap");
  const testText = document.getElementById("test");
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  let playerState = "idle";
  let mapState = "center";
  //PLAYER STUFF
  let player = {
    x: 0,
    y: 0,
  };
  let speed = {
    x: 0,
    y: 0,
  };
  const speedCap = 0.75;
  const speedStep = 0.02;
  const frictionVal = 0.005;
  let keysDown = {};

  function animate() {
    let gameFrame = 0;
    const staggerFrames = 20;
    const spriteAnimations = {
      //player
      idle: {
        loc: [{ x: 0, y: 0 }],
      },
      walk: {
        loc: [
          { x: 200, y: 0 },
          { x: 400, y: 0 },
        ],
      },
      //miniMap
      upLeft: {
        loc: [{ x: 0, y: 0 }],
      },
      upCenter: {
        loc: [{ x: 256, y: 0 }],
      },
      upRight: {
        loc: [{ x: 512, y: 0 }],
      },
      centerLeft: {
        loc: [{ x: 0, y: 256 }],
      },
      center: {
        loc: [{ x: 256, y: 256 }],
      },
      centerRight: {
        loc: [{ x: 512, y: 256 }],
      },
      bottomLeft: {
        loc: [{ x: 0, y: 512 }],
      },
      bottomCenter: {
        loc: [{ x: 256, y: 512 }],
      },
      bottomRight: {
        loc: [{ x: 512, y: 512 }],
      },
    };
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let playerFrameX =
      (200 * Math.floor(gameFrame / staggerFrames)) %
      spriteAnimations[playerState].loc.length;
    let mapFrameX = 256;

    /*let playerFrameX = 0;
    if (playerState === "walk") {
      playerFrameX =
        (Math.floor(gameFrame / staggerFrames) %
          spriteAnimations[playerState].loc.length) *
          200 +
        1;
    } else if (playerState === "idle") {
      playerFrameX =
        (Math.floor(gameFrame / staggerFrames) %
          spriteAnimations[playerState].loc.length) *
        200;
    }*/
    //let mFrameX = playerFrameX;
    let mapFrameY = 0;
    // (image, sourceX, sourceY, sourceW, sourceH, displayX, displayY, displayW, displayH)
    ctx.drawImage(
      playerImage,
      playerFrameX,
      0,
      200,
      200,
      player.x,
      player.y,
      100,
      100,
    );
    ctx.drawImage(
      miniMapImage,
      mapFrameX,
      mapFrameY,
      256,
      256,
      canvas.width - 150,
      0,
      128,
      128,
    );
    gameFrame++;
    requestAnimationFrame(animate);
  }
  window.onload = animate();

  document.addEventListener("keydown", (e) => {
    if (!keysDown[e.code]) {
      keysDown[e.code] = true;
    }
  });

  document.addEventListener("keyup", (e) => {
    keysDown[e.code] = false;
  });

  function runTest() {
    testText.innerText =
      Math.floor(player.x) +
      " : " +
      Math.floor(player.y) +
      " : " +
      speed.x +
      " : " +
      speed.y;
  }

  function move() {
    for (let key in player) {
      //POSITION CHANGE
      player[key] += speed[key];
      //VELOCITY X/Y
      if (speed[key] > -speedCap && speed[key] < speedCap) {
        keyAction(true);
      } else {
        if (speed[key] < speedCap) {
          speed[key] = -speedCap;
        } else {
          speed[key] = speedCap;
        }
      }
      friction(key);
    }
  }

  function friction(coord) {
    if (
      (keysDown["KeyW"] && keysDown["KeyS"]) ||
      (!keysDown["KeyW"] && !keysDown["KeyS"])
    ) {
      if (Math.abs(speed.y) < 0.05) {
        speed.y = 0;
      } else if (speed.y > 0) {
        speed.y += -friction;
      } else if (speed.y < 0) {
        speed.y += friction;
      }
    }
    if (
      (keysDown["KeyA"] && keysDown["KeyD"]) ||
      (!keysDown["KeyA"] && !keysDown["KeyD"])
    ) {
      if (Math.abs(speed.x) < 0.05) {
        speed.x = 0;
      } else if (speed.x > 0) {
        speed.x += -friction;
      } else if (speed.x < 0) {
        speed.x += friction;
      }
    }
  }

  function keyAction(bool) {
    if (bool) {
      if (keysDown.KeyW) {
        speed.y += -speedStep;
      }
      if (keysDown.KeyS) {
        speed.y += speedStep;
      }
      if (keysDown.KeyA) {
        speed.x += -speedStep;
      }
      if (keysDown.KeyD) {
        speed.x += speedStep;
      }
    }
  }

  function stateChange() {
    if (Math.abs(speed.x) === 0 && Math.abs(speed.y) === 0) {
      playerState = "idle";
    } else {
      playerState = "walk";
    }
  }

  function main() {
    move();
    stateChange();
    runTest();
  }

  setInterval(() => {
    main();
  }, 1);
</script>
